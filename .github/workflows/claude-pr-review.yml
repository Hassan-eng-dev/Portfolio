name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  ci:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          # Supabase env vars are needed for build — add these as GitHub secrets
          SUPABASE_URL: https://telxzzwcaqxhvcvhefau.supabase.co
          SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbHh6endjYXF4aHZjdmhlZmF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Mzk2ODUsImV4cCI6MjA5NzAxNTY4NX0.EX9GTR6_HbYt2ImpHEDPfWo5G4jEg3ZDdLa6wahfz0c

  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Run on PRs or when someone comments "@claude" on a PR
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Automatically review every PR; also responds to "@claude <question>" comments
          prompt: |
            You are a strict, zero-tolerance reviewer for Hassan Adel's personal portfolio site — a Nuxt 4 app (Vue 3, TypeScript, Tailwind CSS, Pinia, Supabase, motion-v for animation) with a public-facing site and a separate `/admin` dashboard.
            Go through every changed file line by line. Do not skim, do not summarize away small issues, do not give the benefit of the doubt.
            Do not just pattern-match keywords — reason about what each changed line actually does at runtime: trace the data it reads, the state it depends on, and every call site/caller across the diff before deciding it's correct. A line that "looks right" on a skim can still be wrong once you trace where its inputs come from.
            Flag EVERY bug you find, no matter how trivial it looks — typos, off-by-one errors, unused/duplicate variables, dead code, leftover debug statements (`console.log`, `debugger`), wrong operators (`=` vs `==`, `<` vs `<=`), null/undefined access, unhandled promise rejections, missing awaits, incorrect prop/emit types, hardcoded placeholder values (e.g. `href="#"`) shipped as if final.
            Check for:
            - Correctness bugs and logic errors, including ones that look "too simple to matter"
            - TypeScript type safety issues (implicit any, unsafe casts, missing null checks)
            - Vue 3 / Nuxt 3 best practices and reactivity pitfalls (missing `.value`, losing reactivity via destructuring, wrong lifecycle hook usage)
            - Structural errors in .vue Single File Components: any script code (e.g. `const x = useSomething()`) placed outside the `<script>`/`<script setup>` block, code appearing before the block opens or after it closes, duplicate variable declarations, or stray debug statements
            - motion-v / animation correctness: props like `whileHover`, `whilePress`, `whileInView`, `layoutId` must be camelCase — motion-v reads them dynamically off `$attrs`, so a kebab-case binding (`:while-hover`) silently never fires with no error, since Vue only auto-converts kebab-case for props formally declared via `defineProps`; flag any wrapping of Nuxt-specific components (e.g. `motion.create(NuxtLink)`) since that pattern breaks under SSR — the correct pattern is `<NuxtLink v-slot="{ navigate, href }" custom><motion.a :href="href" @click="navigate">`; flag entrance animations (`initial`/`whileInView` with `opacity: 0`) that have no fallback if JS fails to hydrate, since the element is invisible in the raw SSR HTML until motion-v runs
            - Design-token isolation: this repo intentionally keeps the admin dashboard on the original `primary`/`ink` Tailwind tokens while the public site uses the newer `brand` scale — flag any change that pulls `brand-*` classes into `app/components/admin/**` or `app/pages/admin/**`, or that edits the shared `primary`/`ink` values in `tailwind.config.ts`/`main.scss` in a way that would visibly change the admin UI
            - Accessibility and responsiveness concerns in components
            - Security issues (especially around Supabase queries, RLS assumptions, and auth) — also flag any secret, API key, or credential hardcoded directly in a workflow file, script, or committed config instead of read from `secrets`/environment
            - Performance issues (unnecessary re-renders, N+1 queries, missing memoization)
            If a file has zero issues, say so explicitly rather than omitting it. Do not soften findings or round up to "looks good" when issues exist.
            Post a review comment with every finding listed individually, grouped by severity (Critical / Major / Minor / Nit), each with file, line, and a one-line fix suggestion.
